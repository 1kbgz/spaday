<!doctype html>
<html lang="en" class="wa-theme-default wa-dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>spaday gateway</title>
    <link
      rel="stylesheet"
      href="/js/node_modules/@awesome.me/webawesome/dist/styles/webawesome.css"
    />
    <link
      rel="stylesheet"
      href="/js/node_modules/@awesome.me/webawesome/dist/styles/themes/default.css"
    />
    <script type="module" src="/js/dist/cdn/examples/webawesome.js"></script>
    <style>
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #1b222e;
        color: #e6eefb;
      }
      /* WebAwesome renders an input's `base` part as content-box, so its 16px padding spills past the
         host and overflows the tight right gutter (a horizontal scrollbar). border-box folds it in. */
      wa-input::part(base),
      wa-select::part(combobox) {
        box-sizing: border-box;
      }
      p {
        margin: 0 0 4px;
        color: var(--wa-color-text-quiet, #8fa3c0);
        line-height: 1.5;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <script type="module">
      // The csp-gateway frontend pattern, no transports: a generated Form POSTs to a REST channel, and a
      // live Perspective blotter streams the data back over Perspective's own websocket (Mode B).
      import {
        mount,
        init,
        Store,
        registerHandler,
      } from "/js/dist/esm/index.js";
      import "/js/dist/cdn/wrappers/perspective-workspace.js"; // defines <perspective-panel>

      await init({ module_or_path: "/js/dist/pkg/spaday_bg.wasm" }); // the action interpreter (CallEndpoint / NamedJs)

      const node = await (await fetch("/tree.json")).json();
      // the form's controls two-way bind to this store; the Send handler reads it to POST the order
      const store = new Store({
        symbol: "AAPL",
        side: "buy",
        qty: 100,
        price: 100.0,
      });
      mount(document.body, node, store);
      const byId = (id) => document.getElementById(id);

      // "Send order" — the one bit of glue: compose the form's fields and POST them to the channel. This is
      // what `CallEndpoint(body=form.value)` will make declarative once the DSL can compose an object.
      registerHandler("send-order", async () => {
        const order = {
          symbol: store.get("symbol"),
          side: store.get("side"),
          qty: store.get("qty"),
          price: store.get("price"),
        };
        const res = await fetch("/api/send/orders", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(order),
        });
        byId("status").textContent = res.ok
          ? `sent #${(await res.json()).id}`
          : "rejected (invalid)";
      });

      // Two saved layouts the header's view selector switches between — a flat blotter and a by-symbol roll-up.
      const viewer = (extra) => ({
        sizes: [1],
        detail: {
          main: { type: "tab-area", widgets: ["orders"], currentIndex: 0 },
        },
        master: { sizes: [], widgets: [] },
        mode: "globalFilters",
        viewers: {
          orders: { table: "orders", plugin: "Datagrid", ...extra },
        },
      });
      const VIEWS = {
        blotter: viewer({ title: "Orders", sort: [["id", "desc"]] }),
        symbol: viewer({
          title: "By symbol",
          group_by: ["symbol"],
          columns: ["qty", "price"],
          aggregates: { qty: "sum", price: "avg" },
        }),
      };

      // the blotter connects to the gateway's Perspective websocket; the view selector re-pushes its layout
      const setView = (name) =>
        (byId("blotter").config = {
          ws_url: "/perspective",
          tables: ["orders"],
          layout: VIEWS[name],
        });
      byId("blotter").theme = "dark"; // the panel's own theme setter drives Pro Dark across its viewers
      setView("blotter");
      byId("view").addEventListener("change", (e) => setView(e.target.value));
    </script>
  </body>
</html>
