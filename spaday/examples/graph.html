<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>spaday × transports — live graph</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #fafafa;
        color: #222;
      }
      .card {
        max-width: 940px;
        margin: 32px auto;
        padding: 16px 20px 20px;
        background: #fff;
        border: 1px solid #e6e6e6;
        border-radius: 12px;
        box-shadow: 0 1px 8px #0001;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 4px;
      }
      p {
        margin: 0 0 14px;
        color: #666;
        font-size: 13px;
      }
      code {
        background: #f2f2f2;
        padding: 1px 4px;
        border-radius: 4px;
      }
      .status {
        color: #2962ff;
        font-weight: 600;
      }
      dagre-graph .node rect,
      dagre-graph .node circle,
      dagre-graph .node ellipse {
        fill: #fff;
        stroke: #2962ff;
        stroke-width: 1.5px;
      }
      dagre-graph .edgePath path {
        stroke: #999;
        fill: none;
        stroke-width: 1.5px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>A live graph, synced over transports</h1>
      <p>
        A Python server hosts the graph in a <code>transports.Session</code> and
        adds a node every second; the browser mirrors the model with transports'
        <code>Client</code> and feeds it to the
        <code>&lt;dagre-graph&gt;</code> element (dagre-d3) rendered by spaday.
        <span class="status" id="status">connecting…</span>
      </p>
      <div id="host"></div>
    </div>

    <script type="module">
      import { mount } from "/js/dist/esm/index.js"; // spaday runtime (pure JS)
      import "/js/dist/cdn/wrappers/dagre-graph.js"; // defines <dagre-graph>
      import {
        Client,
        fromValue,
        wasm,
      } from "/nm/@1kbgz/transports/dist/cdn/index.js";

      // transports' Client uses the wasm core (apply/diff) — init it (wasm lives under dist/pkg).
      await wasm.default({
        module_or_path: "/nm/@1kbgz/transports/dist/pkg/transports_bg.wasm",
      });

      const graph = mount(document.getElementById("host"), {
        tag: "dagre-graph",
      });
      graph.style.height = "480px";

      const client = new Client();
      const status = document.getElementById("status");
      let id = null;
      let updates = 0;

      const ws = new WebSocket(`ws://${location.host}/ws`);
      ws.binaryType = "arraybuffer";
      ws.addEventListener("message", (event) => {
        const data =
          typeof event.data === "string"
            ? event.data
            : new Uint8Array(event.data);
        client.recv(data); // update the mirror (snapshot or patch)
        if (id === null) id = client.ids()[0];
        if (id == null) return;
        const model = fromValue(client.value(id)); // untag -> { direction, nodes, edges }
        if (model?.direction) graph.direction = model.direction;
        if (model?.nodes) graph.nodes = model.nodes;
        if (model?.edges) graph.edges = model.edges;
        status.textContent =
          updates++ === 0
            ? "live — streaming over transports"
            : `live — ${updates} update(s), ${model?.nodes?.length ?? 0} nodes`;
      });
      ws.addEventListener("close", () => {
        status.textContent = `disconnected after ${updates} update(s)`;
      });
    </script>
  </body>
</html>
